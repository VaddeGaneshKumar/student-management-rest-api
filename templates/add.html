<!DOCTYPE html>
<html>
<head>
    <title>Add New Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; background-color: #f8f9fa; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 500px; margin: auto; }
    </style>
</head>
<body>

    <div class="box">
        <h2 class="text-center mb-4">Add Student Form 📝</h2>

        <form method="POST">
            {% csrf_token %} {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100">Save Student ✅</button>
        </form>
        </div>

</body>
</html>
