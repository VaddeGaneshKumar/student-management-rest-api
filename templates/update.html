<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; background-color: #e2e6ea; }
        .box { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            width: 500px; 
            margin: auto; 
            border-top: 5px solid orange; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 class="text-center mb-4">✏️ Edit Student Details</h2>

        <form method="POST">
            {% csrf_token %} {{ form.as_p }}

            <button type="submit" class="btn btn-warning w-100">Update Changes 🔄</button>
        </form>
        
        <br>
        <a href="/" class="text-center d-block">Cancel & Go Back</a>

    </div>

</body>
</html>
